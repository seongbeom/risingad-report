<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Cafe24 스크래퍼</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: #fff; border-radius: 8px; padding: 32px; width: 340px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { font-size: 1.3rem; margin-bottom: 24px; text-align: center; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; color: #555; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #4a90d9; }
        button { width: 100%; padding: 10px; background: #4a90d9; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        button:hover { background: #3a7bc8; }
        .error { color: #e74c3c; font-size: 0.85rem; margin-bottom: 12px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Cafe24 스크래퍼</h1>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" required autofocus>
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">로그인</button>
        </form>
    </div>
</body>
</html>
